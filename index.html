<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Melissa Tran Wordle</title>
<style>
body {
    font-family: Arial, sans-serif;
    background: #121213;
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    margin: 0;
}
h1 { margin-top: 20px; }
#grid {
    display: grid;
    grid-template-columns: repeat(12, 40px);
    gap: 5px;
    margin-top: 20px;
}
.tile {
    width: 40px;
    height: 40px;
    border: 2px solid #3a3a3c;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: bold;
    text-transform: uppercase;
}
.correct { background: #538d4e; border-color: #538d4e; }
.present { background: #b59f3b; border-color: #b59f3b; }
.absent { background: #3a3a3c; border-color: #3a3a3c; }
input {
    margin-top: 20px;
    padding: 10px;
    font-size: 18px;
    text-transform: uppercase;
}
button {
    padding: 10px 20px;
    margin-top: 10px;
    font-size: 16px;
    cursor: pointer;
}
</style>
</head>
<body>

<h1>Melissa Tran Wordle</h1>
<div id="grid"></div>
<input id="guessInput" maxlength="12" placeholder="Enter guess"/>
<button onclick="submitGuess()">Guess</button>

<script>
const answer = "melissa tran";
const maxGuesses = 6;
let guesses = [];

const grid = document.getElementById("grid");

function drawGrid() {
    grid.innerHTML = "";
    for (let i = 0; i < maxGuesses; i++) {
        for (let j = 0; j < answer.length; j++) {
            const tile = document.createElement("div");
            tile.className = "tile";
            
            if (guesses[i]) {
                tile.textContent = guesses[i][j] || "";
                if (guesses[i][j] === answer[j]) {
                    tile.classList.add("correct");
                } else if (answer.includes(guesses[i][j])) {
                    tile.classList.add("present");
                } else {
                    tile.classList.add("absent");
                }
            }
            
            grid.appendChild(tile);
        }
    }
}

function submitGuess() {
    const input = document.getElementById("guessInput");
    let guess = input.value.toLowerCase();
    
    if (guess.length !== answer.length) {
        alert("Guess must be exactly " + answer.length + " characters.");
        return;
    }
    
    guesses.push(guess);
    input.value = "";
    drawGrid();
    
    if (guess === answer) {
        setTimeout(() => alert("You got it!"), 100);
    } else if (guesses.length >= maxGuesses) {
        setTimeout(() => alert("Game over! Answer was: " + answer), 100);
    }
}

drawGrid();
</script>

</body>
</html>
